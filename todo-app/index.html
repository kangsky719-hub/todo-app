<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>업무 진행 관리</title>
<meta name="theme-color" content="#0066cc" />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="apple-touch-icon" href="icon-192.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="style.css?v=20" />
</head>
<body>
  <div class="app">
    <header class="app-header">
      <h1>업무 진행 관리</h1>
      <p class="date" id="date"></p>
    </header>

    <div id="auth-bar" class="auth-bar">
      <div id="auth-logged-out">
        <input type="email" id="auth-email" placeholder="이메일" autocomplete="username" />
        <input type="password" id="auth-password" placeholder="비밀번호" autocomplete="current-password" />
        <button id="login-btn" type="button">로그인</button>
        <button id="signup-btn" type="button">회원가입</button>
        <span class="auth-hint">로그인하면 어느 기기에서든 같은 데이터를 볼 수 있어요 (지금은 이 브라우저에만 저장 중)</span>
      </div>
      <div id="auth-logged-in" class="hidden">
        <span id="auth-user"></span>
        <span class="auth-status" id="sync-status">클라우드 동기화 중</span>
        <button id="logout-btn" type="button">로그아웃</button>
      </div>
    </div>

    <div id="summary" class="summary"></div>

    <form id="quick-form" class="quick-form">
      <input
        type="text"
        id="quick-input"
        placeholder='⚡ 빠른 추가 — 예: "다음주 화요일 라인점검 3일간 #제조 긴급"'
        autocomplete="off"
      />
    </form>
    <div id="quick-preview" class="quick-preview hidden"></div>

    <details id="detail-form" class="detail-form">
      <summary>상세 입력 (메모·시작일·상태 포함)</summary>
    <form id="todo-form" class="todo-form">
      <input
        type="text"
        id="todo-input"
        placeholder="할 일을 입력하세요"
        autocomplete="off"
      />
      <div class="date-row">
        <label>
          프로젝트
          <input type="text" id="project-input" list="project-list" placeholder="예: 신제품 런칭" autocomplete="off" />
          <datalist id="project-list"></datalist>
        </label>
        <label>
          시작일 (선택)
          <input type="date" id="start-input" />
        </label>
        <label>
          종료일 (선택)
          <input type="date" id="end-input" />
        </label>
        <label>
          상태
          <select id="status-input">
            <option value="예정">예정</option>
            <option value="진행중">진행중</option>
            <option value="완료">완료</option>
          </select>
        </label>
        <label>
          우선순위
          <select id="priority-input">
            <option value="보통">보통</option>
            <option value="높음">높음</option>
            <option value="낮음">낮음</option>
          </select>
        </label>
        <label>
          반복
          <select id="recurrence-input">
            <option value="없음">반복 없음</option>
            <option value="매일">매일</option>
            <option value="매주">매주</option>
            <option value="매월">매월</option>
          </select>
        </label>
      </div>
      <textarea id="memo-input" rows="2" placeholder="메모 (선택)"></textarea>
      <button type="submit">추가</button>
    </form>
    </details>

    <div class="toolbar">
      <input
        type="search"
        id="search-input"
        placeholder="검색 (제목·프로젝트·메모)"
        autocomplete="off"
      />
      <select id="sort-select" title="정렬 기준">
        <option value="start">시작일순</option>
        <option value="end">마감일순</option>
        <option value="priority">우선순위순</option>
      </select>
      <select id="colorby-select" title="간트·캘린더 색상 기준">
        <option value="status">색: 상태</option>
        <option value="project">색: 프로젝트</option>
      </select>
    </div>

    <div id="project-legend" class="project-legend"></div>

    <div class="view-tabs">
      <button class="view-tab active" data-view="list">목록</button>
      <button class="view-tab" data-view="note">노트</button>
      <button class="view-tab" data-view="board">보드</button>
      <button class="view-tab" data-view="gantt">간트차트</button>
      <button class="view-tab" data-view="calendar">캘린더</button>
      <button class="view-tab" data-view="stats">통계</button>
      <button class="view-tab" data-view="approval">승인집계</button>
    </div>

    <div id="list-view" class="view">
      <div class="filters">
        <button class="filter-btn active" data-filter="all">전체</button>
        <button class="filter-btn" data-filter="예정">예정</button>
        <button class="filter-btn" data-filter="진행중">진행중</button>
        <button class="filter-btn" data-filter="완료">완료</button>
        <button class="filter-btn" data-filter="지연">지연</button>
      </div>

      <ul id="todo-list" class="todo-list"></ul>

      <footer class="app-footer">
        <span id="items-left">0개 남음</span>
        <span class="footer-actions">
          <button id="notify-btn">알림 켜기</button>
          <button id="export-btn">내보내기</button>
          <button id="import-btn">가져오기</button>
          <button id="clear-completed">완료 항목 삭제</button>
        </span>
        <input type="file" id="import-file" accept=".json,application/json" hidden />
      </footer>
    </div>

    <div id="note-view" class="view hidden">
      <div class="note-header">
        <div class="note-nav">
          <button id="note-prev" type="button" title="이전 날">◀</button>
          <button id="note-today" type="button">오늘</button>
          <button id="note-next" type="button" title="다음 날">▶</button>
          <input type="date" id="note-date-pick" title="날짜 선택" />
        </div>
        <button id="note-print" type="button" title="이 노트 인쇄">인쇄</button>
      </div>

      <div class="note-hero">
        <span id="note-day-num" class="note-day-num"></span>
        <div class="note-day-meta">
          <span id="note-day-title" class="note-day-title"></span>
          <span id="note-day-sub" class="note-day-sub"></span>
        </div>
      </div>

      <div id="note-tasks" class="note-tasks"></div>

      <div class="note-templates" id="note-templates"></div>

      <textarea
        id="note-text"
        class="note-text"
        placeholder="오늘의 업무 기록을 남겨보세요.&#10;위 템플릿 버튼을 누르면 인수인계·생산일지·회의록 양식이 채워집니다."
        rows="14"
      ></textarea>

      <div class="note-footer">
        <span id="note-save-status" class="note-save-status"></span>
        <span class="note-actions">
          <button id="note-to-task" type="button" title="노트에서 드래그로 선택한 문장을 할 일로 등록">선택한 문장 → 할 일</button>
        </span>
      </div>
      <p class="note-hint">노트는 이 기기에만 저장됩니다 (클라우드 전송 안 함). 푸터의 내보내기 백업에는 포함돼요.</p>

      <div class="note-past">
        <div class="note-past-head">
          <h3 class="stat-heading">지난 노트</h3>
          <input type="search" id="note-search" placeholder="노트 내용 검색" autocomplete="off" />
        </div>
        <div id="note-past-list"></div>
      </div>
    </div>

    <div id="note-print-area" aria-hidden="true"></div>

    <div id="board-view" class="view hidden">
      <div id="board-key" class="view-proj-key"></div>
      <div id="board" class="board"></div>
    </div>

    <div id="gantt-view" class="view hidden">
      <div id="gantt-key" class="view-proj-key"></div>
      <div id="gantt-chart" class="gantt-chart"></div>
    </div>

    <div id="calendar-view" class="view hidden">
      <div id="calendar-key" class="view-proj-key"></div>
      <div class="cal-header">
        <button id="cal-prev" type="button" title="이전 달">◀</button>
        <div id="cal-title" class="cal-title"></div>
        <button id="cal-next" type="button" title="다음 달">▶</button>
        <button id="cal-today" type="button">오늘</button>
      </div>
      <div class="cal-scroll">
        <div class="cal-dow">
          <span class="sun">일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span class="sat">토</span>
        </div>
        <div id="calendar-grid" class="cal-grid"></div>
      </div>
      <p class="cal-hint">빈 날짜를 클릭하면 그 날짜로 새 업무를 추가할 수 있어요</p>
      <div id="calendar-undated"></div>
    </div>

    <div id="stats-view" class="view hidden">
      <div id="stats" class="stats"></div>
    </div>

    <div id="approval-view" class="view hidden">
      <form id="approval-form" class="approval-form">
        <div class="approval-row">
          <label>
            날짜
            <input type="date" id="approval-date" />
          </label>
          <label>
            구분
            <select id="approval-type">
              <option value="order">order</option>
              <option value="출하승인">출하승인</option>
              <option value="기타">기타</option>
            </select>
          </label>
          <label>
            건수
            <input type="number" id="approval-count" min="1" placeholder="예: 32" />
          </label>
          <button type="submit">기록</button>
        </div>
        <p class="approval-hint">MES 조회 화면에서 본 승인 건수를 입력하세요. 하루 한 번, 또는 주/월 단위로 몰아서 기록해도 됩니다.</p>
      </form>
      <div id="approval-body"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="script.js?v=20"></script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("sw.js").catch((e) =>
          console.error("SW 등록 실패", e)
        );
      });
    }
  </script>
</body>
</html>
