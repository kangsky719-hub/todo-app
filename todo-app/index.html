<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>업무 진행 관리</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="app-header">
      <h1>업무 진행 관리</h1>
      <p class="date" id="date"></p>
    </header>

    <form id="todo-form" class="todo-form">
      <input
        type="text"
        id="todo-input"
        placeholder="할 일을 입력하세요"
        autocomplete="off"
      />
      <div class="date-row">
        <label>
          프로젝트
          <input type="text" id="project-input" list="project-list" placeholder="예: 신제품 런칭" autocomplete="off" />
          <datalist id="project-list"></datalist>
        </label>
        <label>
          시작일
          <input type="date" id="start-input" required />
        </label>
        <label>
          종료일
          <input type="date" id="end-input" required />
        </label>
        <label>
          상태
          <select id="status-input">
            <option value="예정">예정</option>
            <option value="진행중">진행중</option>
            <option value="완료">완료</option>
          </select>
        </label>
      </div>
      <textarea id="memo-input" rows="2" placeholder="메모 (선택)"></textarea>
      <button type="submit">추가</button>
    </form>

    <div class="view-tabs">
      <button class="view-tab active" data-view="list">목록</button>
      <button class="view-tab" data-view="gantt">간트차트</button>
    </div>

    <div id="list-view" class="view">
      <div class="filters">
        <button class="filter-btn active" data-filter="all">전체</button>
        <button class="filter-btn" data-filter="예정">예정</button>
        <button class="filter-btn" data-filter="진행중">진행중</button>
        <button class="filter-btn" data-filter="완료">완료</button>
        <button class="filter-btn" data-filter="지연">지연</button>
      </div>

      <ul id="todo-list" class="todo-list"></ul>

      <footer class="app-footer">
        <span id="items-left">0개 남음</span>
        <span class="footer-actions">
          <button id="export-btn">내보내기</button>
          <button id="import-btn">가져오기</button>
          <button id="clear-completed">완료 항목 삭제</button>
        </span>
        <input type="file" id="import-file" accept=".json,application/json" hidden />
      </footer>
    </div>

    <div id="gantt-view" class="view hidden">
      <div id="gantt-chart" class="gantt-chart"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
